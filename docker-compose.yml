version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/devprep
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prod_secret_key
      - REFRESH_TOKEN_SECRET=prod_refresh_secret_key
      - JUDGE0_URL=http://judge0:8000
    depends_on:
      - mongo
      - redis
      - judge0

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
